function renderPurchasePlan(selIds){
  var plan=buildPurchasePlan(selIds);
  var clientsSet={}; selIds.forEach(function(sid){ if(_selCache[sid]) clientsSet[_selCache[sid].clientName]=1; });
  var nClients=Object.keys(clientsSet).length;
  var supplierNames=Object.keys(plan.onlineGroups).sort(function(a,b){return a.localeCompare(b,'fr');});
  _supUrls={};

  var grandParts=0, grandShip=0, totalUnits=0;
  supplierNames.forEach(function(s){
    var arr=plan.onlineGroups[s];
    grandParts+=arr.reduce(function(a,p){return a+p.cost*p.qty;},0);
    grandShip+=arr.reduce(function(m,p){return Math.max(m,p.ship);},0);
    arr.forEach(function(p){ totalUnits+=p.qty; });
  });
  plan.manual.forEach(function(p){ grandParts+=p.cost*p.qty; totalUnits+=p.qty; });

  var html='<button class="btn-back-nav" onclick="renderSelections()">&#8592; Retour aux sélections</button>';
  html+='<div class="purchase-head">'
    +'<div class="purchase-title">Liste d\'achats optimisée</div>'
    +'<div class="purchase-sub">'+selIds.length+' sélection'+(selIds.length>1?'s':'')+' · '+nClients+' client'+(nClients>1?'s':'')+' · '+totalUnits+' pièce'+(totalUnits>1?'s':'')+' à acheter · '+supplierNames.length+' fournisseur'+(supplierNames.length>1?'s':'')+'</div>'
    +'<div class="purchase-totals">'
      +'<span>Pièces : <strong>'+grandParts.toFixed(2)+' €</strong></span>'
      +'<span>Port mutualisé : <strong>'+grandShip.toFixed(2)+' €</strong></span>'
      +'<span>Total estimé : <strong>'+(grandParts+grandShip).toFixed(2)+' €</strong></span>'
    +'</div></div>';

  if(supplierNames.length){
    html+='<div class="purchase-section-title">Commandes en ligne — groupées par fournisseur</div>';
    supplierNames.forEach(function(s,si){
      var arr=plan.onlineGroups[s];
      var partsSum=arr.reduce(function(a,p){return a+p.cost*p.qty;},0);
      var ship=arr.reduce(function(m,p){return Math.max(m,p.ship);},0);
      var shipVaries=arr.some(function(p){return Number(p.ship)!==Number(arr[0].ship);});
      _supUrls[si]=arr.map(function(p){return p.url;}).filter(Boolean);
      html+='<div class="supplier-block">'
        +'<div class="supplier-head">'
          +'<div class="supplier-name">'+s+' <span class="supplier-count">'+arr.length+' référence'+(arr.length>1?'s':'')+'</span></div>'
          +'<button class="btn-xs" onclick="openSupplierLinks('+si+')">Ouvrir tous les liens ↗</button>'
        +'</div>';
      arr.forEach(function(p){ html+=purchaseRow(p); });
      html+='<div class="supplier-foot">'
        +'<span>Sous-total pièces : '+partsSum.toFixed(2)+' €</span>'
        +'<span>Frais de port : <strong>'+ship.toFixed(2)+' €</strong>'+(shipVaries?' <em style="color:#c9a050">(port variable / express — max retenu)</em>':' (1 seule commande)')+'</span>'
        +'<span class="supplier-total">Total : '+(partsSum+ship).toFixed(2)+' €</span>'
      +'</div></div>';
    });
  }
  if(plan.manual.length){
    html+='<div class="purchase-section-title">À commander manuellement / sur-mesure <span style="font-weight:400;text-transform:none;letter-spacing:0;color:#aaa">— pas de lien, contact fournisseur</span></div>';
    html+='<div class="supplier-block">';
    plan.manual.forEach(function(p){ html+=purchaseRow(p); });
    html+='</div>';
  }
  if(!supplierNames.length && !plan.manual.length){
    html+='<div class="alert alert-info">Aucune pièce à acheter dans ces sélections.</div>';
  }
  document.getElementById('view').innerHTML=html;
  window.scrollTo({top:0,behavior:'instant'});
  window.parent.postMessage({type:'mwa-scroll-top'},'*');
  notifyHeight();
}

    +'<div><div style="font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:#999;margin-bottom:4px">Cout pieces (auto)</div>'
    +'<div style="font-size:16px;font-weight:500;color:#1a1a1a">'+totalCost.toFixed(2)+' €</div></div>'
    +'<div><label style="font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:#999;display:block;margin-bottom:4px">Main oeuvre (€)</label>'
    +'<input id="dv-mo" type="number" value="0" min="0" oninput="calcDevis()" style="width:100%;padding:8px 10px;border:1px solid #d4cfc8;border-radius:2px;font-size:14px;font-family:inherit;outline:none"></div>'
    +'<div><label style="font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:#999;display:block;margin-bottom:4px">Marge (%)</label>'
    +'<input id="dv-mg" type="number" value="30" min="0" max="300" oninput="calcDevis()" style="width:100%;padding:8px 10px;border:1px solid #d4cfc8;border-radius:2px;font-size:14px;font-family:inherit;outline:none"></div>'
    +'<div><div style="font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:#999;margin-bottom:4px">Prix final client</div>'
    +'<div id="dv-total" style="font-size:24px;font-weight:600;color:#1a1a1a;padding-top:2px">—</div></div>'
    +'</div>'
    +'<div style="display:flex;gap:8px;margin-top:1rem">'
    +'<button class="btn btn-s" style="flex:1" onclick="closeDevis()">Annuler</button>'
    +'<button class="btn btn-p" style="flex:1" onclick="exportDevis()">Générer le devis PDF</button>'
    +'</div></div>';
  wrap.innerHTML=html;
  document.body.appendChild(wrap);
  calcDevis();
}

function calcDevis(){
  var tc=_devisData.totalCost||0;
  var mo=parseFloat((document.getElementById('dv-mo')||{value:0}).value)||0;
  var mg=parseFloat((document.getElementById('dv-mg')||{value:30}).value)||0;
  var total=(tc+mo)*(1+mg/100);
  var el=document.getElementById('dv-total');
  if(el) el.textContent=total.toFixed(2)+' €';
}

function exportDevis(){
  var d=_devisData;
  if(!d.clientName) return;
  var mo=parseFloat((document.getElementById('dv-mo')||{value:0}).value)||0;
  var mg=parseFloat((document.getElementById('dv-mg')||{value:30}).value)||0;
  var base=(d.totalCost||0)+mo;
  var total=base*(1+mg/100);
  var date=new Date().toLocaleDateString('fr-FR',{day:'2-digit',month:'long',year:'numeric'});
  var num='DEV-'+Date.now().toString().slice(-6);

  var rows=d.items.map(function(p){
    return '<tr style="border-bottom:1px solid #f0ede8">'
      +'<td style="padding:10px 8px;width:60px"><div style="width:52px;height:52px;background:#f8f7f4;border-radius:2px;overflow:hidden;display:flex;align-items:center;justify-content:center">'
      +(p.img?'<img src="'+p.img+'" style="width:100%;height:100%;object-fit:contain;padding:3px">':'')
      +'</div></td>'
      +'<td style="padding:10px 8px"><div style="font-size:12px;font-weight:500;color:#1a1a1a;margin-bottom:2px">'+p.name+'</div>'
      +'<div style="font-size:10px;color:#aaa;text-transform:uppercase;letter-spacing:.05em">'+p.cat+'</div></td>'
      +'</tr>';
  }).join('');

  var html='<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8"><title>Devis '+num+'</title>'
    +'<link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@300;400;500;600&display=swap" rel="stylesheet">'
    +'<style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:"League Spartan",sans-serif;background:#fff;color:#1a1a1a;font-size:13px;-webkit-print-color-adjust:exact;print-color-adjust:exact}@media print{.noprint{display:none!important}@page{margin:1.2cm;size:A4}}</style>'
    +'</head><body>'

    // En-tête noire
    +'<div style="background:#1a1a1a;padding:1.75rem 2.5rem;display:flex;justify-content:space-between;align-items:flex-end">'
    +'<div><div style="font-size:28px;font-weight:300;letter-spacing:.12em;color:#fff;text-transform:lowercase">bang.</div>'
    +'<div style="font-size:9px;letter-spacing:.18em;color:#777;text-transform:uppercase;margin-top:5px">atelier de montres custom</div></div>'
    +'<div style="text-align:right"><div style="font-size:9px;letter-spacing:.12em;color:#666;text-transform:uppercase;margin-bottom:3px">Devis</div>'
    +'<div style="font-size:20px;font-weight:500;color:#fff;letter-spacing:.06em">'+num+'</div></div>'
    +'</div>'
    // Ligne dorée
    +'<div style="height:2px;background:linear-gradient(90deg,transparent,#c9a96e 20%,#e8d5a3 50%,#c9a96e 80%,transparent)"></div>'

    // Client + date
    +'<div style="display:flex;justify-content:space-between;padding:1.5rem 2.5rem 1.25rem;border-bottom:1px solid #f0ede8">'
    +'<div><div style="font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:#bbb;margin-bottom:6px">Etabli pour</div>'
    +'<div style="font-size:20px;font-weight:300;letter-spacing:.02em">'+d.clientName+'</div></div>'
    +'<div style="text-align:right"><div style="font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:#bbb;margin-bottom:6px">Date</div>'
    +'<div style="font-size:13px;font-weight:400">'+date+'</div>'
    +'<div style="font-size:10px;color:#bbb;margin-top:3px">Valable 30 jours</div></div>'
    +'</div>'

    // Pièces
    +'<div style="padding:1.25rem 2.5rem">'
    +'<div style="font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:#bbb;margin-bottom:.875rem">Pieces selectionnees ('+d.items.length+')</div>'
    +'<table style="width:100%;border-collapse:collapse">'+rows+'</table>'
    +'</div>'

    // Total
    +'<div style="margin:0 2.5rem 1.5rem;background:#f8f7f4;border-radius:2px;padding:1.25rem 1.5rem">'
    +'<div style="font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:#bbb;margin-bottom:.875rem">Recapitulatif</div>'
    +(mo>0?'<div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid #ede9e3;font-size:12px"><span style="color:#666">Main oeuvre</span><span style="font-weight:500">'+mo.toFixed(2)+' €</span></div>':'')
    +(mg>0?'<div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid #ede9e3;font-size:12px"><span style="color:#666">Marge atelier ('+mg+'%)</span><span style="font-weight:500">'+(base*mg/100).toFixed(2)+' €</span></div>':'')

    +'<span style="font-size:28px;font-weight:600;letter-spacing:.02em">'+total.toFixed(2)+' €</span>'
    +'</div></div>'

    // Pied de page
    +'<div style="padding:1rem 2.5rem;border-top:1px solid #f0ede8;display:flex;justify-content:space-between;align-items:flex-end">'
    +'<div style="font-size:10px;color:#bbb;line-height:1.8">Ce devis est indicatif et valable 30 jours.<br>Les prix peuvent varier selon les disponibilites fournisseurs.</div>'
    +'<div style="font-size:10px;color:#bbb;text-align:right">atelier-bang.com<br>Dissay, Nouvelle-Aquitaine</div>'
    +'</div>'

    +'<div class="noprint" style="padding:1.5rem;text-align:center;border-top:1px solid #f0ede8">'
    +'<button onclick="window.print()" style="background:#1a1a1a;color:#fff;border:none;padding:12px 36px;font-family:inherit;font-size:11px;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;border-radius:2px">Imprimer / Enregistrer PDF</button>'
    +'</div>'
    +'<script>setTimeout(function(){window.print();},600);<\/script>'
    +'</body></html>';

  var w=window.open('','_blank','width=860,height=900');
  if(w){w.document.write(html);w.document.close();}
  closeDevis();
}

// Délégation globale pour tous les boutons de l'app
document.addEventListener('click', function(e){
  var t = e.target;
  // Doublons
  var dupBtn = t.closest('.dup-del-btn');
  if(dupBtn){ var id=dupBtn.getAttribute('data-delid'); var fn=dupBtn.getAttribute('data-delfn'); if(fn==='delItem'&&id) delItem(id); return; }
  // Sélections
  var selDevis = t.closest('[data-action="devis"]');
  if(selDevis){ openDevis(selDevis.getAttribute('data-id')); return; }
  var selDel = t.closest('[data-action="del"]');
  if(selDel){ deleteSel(selDel.getAttribute('data-id')); return; }
  // Clic sur ligne doublon → ouvrir édition
  var dupRow = t.closest('.dup-row[data-editid]');
  if(dupRow && !t.closest('.dup-del-btn')){ openEdit(dupRow.getAttribute('data-editid')); return; }
  // Édition pièce
  if(t.id==='btn-back-edit'||t.id==='btn-cancel-edit'){ closeEdit(); return; }
  if(t.id==='btn-save-edit'){ if(window._editId) saveEdit(window._editId); return; }
  if(t.id==='btn-regen-edit'){ if(window._editId) regenDesc(window._editId); return; }
});

// Normaliser les catégories au chargement (Boitier → Boîtier etc)
async function normalizeCats(){
  const map={'Boitier':'Boîtier','boitier':'Boîtier','boîtier':'Boîtier',
             'Lunette':'Lunette','lunette':'Lunette',
             'Cadran':'Cadran','cadran':'Cadran',
             'Aiguille':'Aiguilles','aiguilles':'Aiguilles',
             'Bracelet':'Bracelet','bracelet':'Bracelet'};
  var changed=[];
  for(var i=0;i<items.length;i++){
    var correct=map[items[i].cat];
    if(correct && correct!==items[i].cat){
      changed.push({id:items[i].id, cat:correct});
      items[i]={...items[i],cat:correct};
    }
  }
  if(!changed.length){ alert('Aucune correction nécessaire.'); return; }
  if(isConfigured()){
    for(var c=0;c<changed.length;c++){
      await SB.update(changed[c].id,{cat:changed[c].cat});
    }
  }
  alert(changed.length+' pièce(s) corrigée(s) !');
  renderAdmin();
}

init();

// Auto-resize iframe WordPress
function notifyHeight(){
  if(window.parent===window) return;
  var h=document.body.scrollHeight;
  window.parent.postMessage({type:'mwa-resize',height:h},'*');
}
var _lastH=0;
var _roTimer=null;
new ResizeObserver(function(){
  if(window._typing) return; // ne pas perturber le focus pendant la frappe
  clearTimeout(_roTimer);
  _roTimer=setTimeout(function(){
    if(window._typing) return;
    var h=document.body.scrollHeight;
    if(Math.abs(h-_lastH)>10){ _lastH=h; notifyHeight(); }
  },200);
}).observe(document.body);
notifyHeight();
</script>
