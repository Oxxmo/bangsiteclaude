<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>bang. — catalogue pièces</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ── RESET ── */
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-font-smoothing:antialiased}
body{font-family:'League Spartan',sans-serif;background:#f4f2ee;color:#1a1a1a;font-size:14px;line-height:1.6}
button,input,select,textarea{font-family:inherit}
a{color:inherit;text-decoration:none}

/* ── LAYOUT ── */
.app{max-width:1080px;margin:0 auto;padding:1.5rem 1rem;position:relative;min-height:auto}

/* ── TOPBAR ── */
.topbar{display:flex;align-items:center;justify-content:space-between;gap:.75rem;flex-wrap:wrap;background:#1f1d1b;margin:-1.5rem -1rem 0;padding:.85rem 1.5rem;position:relative;z-index:5}
.logo{font-size:19px;font-weight:300;letter-spacing:.04em;color:#fff;text-transform:lowercase;cursor:pointer;display:flex;align-items:baseline;gap:8px;line-height:1}
.logo b{font-weight:600;letter-spacing:.02em}
.logo span{color:#b3a98f;font-style:normal;font-weight:300;font-size:11px;letter-spacing:.04em;text-transform:none}
.nav{display:flex;gap:3px;flex-wrap:wrap;align-items:center}
.nb{padding:8px 14px;border:1px solid transparent;border-radius:9px;font-size:11px;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;background:transparent;color:#9b948a;transition:.18s;white-space:nowrap}
.nb.active{background:#fff;color:#1a1a1a;border-color:#fff;font-weight:600}
.nb:hover:not(.active){background:rgba(255,255,255,.08);color:#fff}
.nb.danger{color:#c08a8a}
.nb.danger:hover{background:rgba(192,96,96,.16);color:#e8a8a8}
/* Zone sous le bandeau : collée au hero sur le catalogue, espacée ailleurs */
.below-pad{padding-top:1.5rem}
.below-pad .alert:first-child{margin-top:0}

/* ── FILTER ── */
.filter-bar{display:flex;gap:6px;margin-bottom:1.25rem;align-items:center;overflow-x:auto;flex-wrap:nowrap;-webkit-overflow-scrolling:touch;padding-bottom:4px;scrollbar-width:none}
.chip{padding:5px 14px;border:1px solid #d8d4ce;border-radius:2px;font-size:11px;letter-spacing:.05em;text-transform:uppercase;cursor:pointer;background:#fff;color:#888;transition:.15s;white-space:nowrap}
.chip.active{border-color:#1a1a1a;color:#1a1a1a;background:#1a1a1a;color:#fff}
.chip:hover:not(.active){border-color:#999;color:#555}
.filter-bar::-webkit-scrollbar{display:none}
.s-in{flex:1;min-width:130px;font-size:13px;padding:7px 13px;border:1px solid #d8d4ce;border-radius:2px;background:#fff;color:#1a1a1a;outline:none}
.s-in:focus{border-color:#1a1a1a}
.s-in::placeholder{color:#bbb}

/* ── STATS BAR ── */
.stats-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1.25rem}
.stat-chip{padding:5px 12px;background:#fff;border:1px solid #e8e5e0;border-radius:2px;font-size:10px;letter-spacing:.05em;color:#888;white-space:nowrap}
.stat-chip strong{color:#1a1a1a;font-weight:600}

/* ── BASKET BAR ── */
.bbar{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.75rem;padding:.875rem 1.25rem;border:1px solid #e0ddd8;border-radius:2px;margin-bottom:1.25rem;background:#fff}
.bbar-info{font-size:11px;color:#999;letter-spacing:.05em;text-transform:uppercase}
.bbar-info strong{color:#1a1a1a}
.bbar-btns{display:flex;gap:6px}

/* ── GRID ── */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:1.25rem;margin-bottom:1.5rem}
.card{background:#fff;border:1px solid #e8e5e0;border-radius:2px;overflow:hidden;cursor:pointer;transition:.2s}
.card:hover{border-color:#aaa;box-shadow:0 4px 16px rgba(0,0,0,.08)}
.card.sel{border-color:#1a1a1a;box-shadow:0 0 0 2px #1a1a1a}
.c-img{width:100%;height:160px;background:#f8f7f4;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative}
.c-img img{width:100%;height:100%;object-fit:contain;padding:8px;transition:.3s}
.card:hover .c-img img{transform:scale(1.03)}
.c-img-ph{font-size:10px;color:#ccc;letter-spacing:.06em;text-transform:uppercase}
.c-body{padding:11px 12px 12px;border-top:1px solid #f0ede8}
.c-cat{font-size:9px;color:#bbb;letter-spacing:.1em;text-transform:uppercase;margin-bottom:4px}
.c-name{font-size:12px;font-weight:500;color:#1a1a1a;margin-bottom:4px;line-height:1.4}
.c-desc{font-size:11px;color:#999;line-height:1.55;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:9px}
.c-foot{display:flex;align-items:center;justify-content:space-between}
.c-ref{font-size:9px;color:#ccc;letter-spacing:.05em}
.add-btn{width:26px;height:26px;border-radius:50%;border:1px solid #ddd;background:#fff;display:flex;align-items:center;justify-content:center;color:#aaa;font-size:15px;transition:.15s;line-height:1;flex-shrink:0}
.add-btn:hover{border-color:#1a1a1a;color:#1a1a1a}
.add-btn.on{border-color:#1a1a1a;background:#1a1a1a;color:#fff;font-weight:600}

/* ── SELECTION PANEL ── */
.sel-panel{background:#fff;border:1px solid #e8e5e0;border-radius:2px;padding:1.25rem;margin-bottom:1.25rem}
.sel-title{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:#999;margin-bottom:1rem}
.sel-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(95px,1fr));gap:.625rem}
.sel-item{text-align:center}
.sel-img{width:100%;height:80px;border-radius:2px;background:#f8f7f4;overflow:hidden;display:flex;align-items:center;justify-content:center;margin-bottom:5px;border:1px solid #eee}
.sel-img img{width:100%;height:100%;object-fit:contain;padding:4px}
.sel-name{font-size:10px;color:#333;line-height:1.35;margin-bottom:1px;font-weight:500}
.sel-cat{font-size:9px;color:#bbb;letter-spacing:.05em;text-transform:uppercase}

/* ── SECTION ── */
.section{background:#fff;border:1px solid #e8e5e0;border-radius:2px;padding:1.25rem;margin-bottom:1rem}
.sec-title{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:#999;margin-bottom:1rem}

/* ── BUTTONS ── */
.btn{padding:8px 18px;font-size:11px;letter-spacing:.07em;text-transform:uppercase;border-radius:2px;cursor:pointer;font-weight:500;transition:.15s}
.btn-p{background:#1a1a1a;color:#fff;border:none}
.btn-p:hover{background:#333}
.btn-p:disabled{opacity:.35;cursor:not-allowed}
.btn-s{background:#fff;color:#555;border:1px solid #d8d4ce}
.btn-s:hover{border-color:#999;color:#222}
.btn-xs{padding:3px 9px;font-size:10px;letter-spacing:.04em;text-transform:uppercase;border:1px solid #d8d4ce;border-radius:2px;cursor:pointer;background:#fff;color:#888;transition:.12s}
.btn-xs:hover{border-color:#999;color:#333}
.btn-xs.del{border-color:#dcc;color:#c06060}
.btn-xs.del:hover{border-color:#c06060;background:#fff5f5}

/* ── MODE PILLS ── */
.mode-pills{display:flex;gap:6px;margin-bottom:1rem;flex-wrap:wrap}
.mode-pill{padding:5px 13px;border:1px solid #d8d4ce;border-radius:2px;font-size:11px;letter-spacing:.04em;text-transform:uppercase;cursor:pointer;color:#999;background:#fff;transition:.15s}
.mode-pill.active{border-color:#1a1a1a;color:#fff;background:#1a1a1a}

/* ── INPUTS ── */
.field{display:flex;flex-direction:column;gap:5px;margin-bottom:.875rem}
.field label{font-size:10px;letter-spacing:.07em;text-transform:uppercase;color:#999}
.field input,.field select,.field textarea{font-size:13px;padding:8px 11px;border:1px solid #d8d4ce;border-radius:2px;background:#fff;color:#1a1a1a;outline:none}
.field input:focus,.field select:focus,.field textarea:focus{border-color:#1a1a1a}
.field input::placeholder{color:#ccc}
.field .hint{font-size:10px;color:#bbb;margin-top:2px}

/* ── STATUS ── */
.status{font-size:11px;color:#999;display:flex;align-items:center;gap:7px;min-height:20px;margin-top:.75rem;letter-spacing:.02em}
.dot{width:6px;height:6px;border-radius:50%;background:#6a9a6a;flex-shrink:0}
.dot.spin{background:#c9a050;animation:blink 1s infinite}
.dot.err{background:#c06060}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.15}}

/* ── URL ROW ── */
.url-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:.875rem}
.url-row input{flex:1;min-width:200px;font-size:13px;padding:9px 12px;border:1px solid #d8d4ce;border-radius:2px;background:#fff;color:#1a1a1a;outline:none}
.url-row input:focus{border-color:#1a1a1a}
.url-row input::placeholder{color:#ccc}
.ship-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:.5rem}
.ship-row label{font-size:10px;letter-spacing:.07em;text-transform:uppercase;color:#999}
.ship-row input{width:62px;font-size:13px;padding:6px 8px;border:1px solid #d8d4ce;border-radius:2px;background:#fff;color:#1a1a1a;outline:none}
.ship-row input:focus{border-color:#1a1a1a}

/* ── SCAN LIST ── */
.sc-item{display:flex;gap:10px;align-items:center;padding:10px 12px;border:1px solid #eee;border-radius:2px;margin-bottom:6px;cursor:pointer;transition:.12s;background:#fff}
.sc-item:hover{border-color:#aaa}
.sc-item.on{border-color:#1a1a1a;background:#fafaf8}
.sc-check{width:18px;height:18px;border-radius:2px;border:1px solid #d8d4ce;background:#fff;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;color:#1a1a1a;font-weight:600;transition:.12s}
.sc-check.on{background:#1a1a1a;border-color:#1a1a1a;color:#fff}
.sc-thumb{width:52px;height:52px;flex-shrink:0;border-radius:2px;background:#f8f7f4;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:9px;color:#ccc;border:1px solid #eee}
.sc-thumb img{width:100%;height:100%;object-fit:contain;padding:2px}
.sc-info{flex:1;min-width:0}
.sc-name{font-size:12.5px;color:#1a1a1a;margin-bottom:2px;font-weight:500}
.sc-meta{font-size:10px;color:#aaa;letter-spacing:.03em;margin-bottom:2px}
.sc-price{font-size:12px;font-weight:500;color:#555}
.sc-url{font-size:9px;color:#ccc;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
.scan-top{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:1rem}
.sc-desc-preview{font-size:10px;color:#aaa;margin-top:2px;line-height:1.4;font-style:italic}

/* ── ADMIN ── */
.stat-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:8px;margin-bottom:1.25rem}
.stat{background:#fff;border:1px solid #e8e5e0;border-radius:2px;padding:.75rem 1rem}
.stat-l{font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:#bbb;margin-bottom:4px}
.stat-v{font-size:20px;font-weight:300;color:#1a1a1a}
.adm-item{display:grid;grid-template-columns:62px 1fr auto;gap:12px;align-items:start;padding:12px 13px;border:1px solid #e8e5e0;border-radius:2px;margin-bottom:7px;background:#fff;transition:.12s}
.adm-item:hover{border-color:#aaa}
.adm-item.adm-sel{border-color:#1a1a1a;background:#fafaf8}
.adm-cb{width:18px;height:18px;border:1px solid #d8d4ce;border-radius:2px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:#1a1a1a;transition:.12s;background:#fff;flex-shrink:0}
.adm-cb:hover{border-color:#1a1a1a}
.adm-cb.on{background:#1a1a1a;border-color:#1a1a1a;color:#fff}
.adm-thumb{width:56px;height:56px;border-radius:2px;background:#f8f7f4;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:9px;color:#ccc;flex-shrink:0;border:1px solid #eee;cursor:pointer}
.adm-thumb img{width:100%;height:100%;object-fit:contain;padding:3px}
.adm-name{font-size:12.5px;color:#1a1a1a;margin-bottom:2px;font-weight:500}
.adm-meta{font-size:10px;color:#bbb;margin-bottom:6px;letter-spacing:.02em}
.badges{display:flex;gap:4px;flex-wrap:wrap;align-items:center}
.badge{font-size:10px;padding:2px 8px;border-radius:2px;letter-spacing:.02em}
.b-cost{background:#fdf8ee;color:#8a6a20;border:1px solid #f0e8cc}
.b-ship{background:#eef4fd;color:#2a5a8a;border:1px solid #ccddf0}
.b-total{background:#f5f4f0;color:#666;border:1px solid #e0ddd8}
.b-sell{background:#eefbee;color:#2a6a2a;border:1px solid #cceacc;display:flex;align-items:center;gap:4px}
.b-margin{background:#f5f4ff;color:#4a4a9a;border:1px solid #ddddf0}
.b-warn{background:#fff5f5;color:#c06060;border:1px solid #f0cccc}
.sell-inp{width:60px;font-size:11px;padding:1px 5px;border:1px solid #aadaaa;border-radius:2px;background:transparent;color:#2a6a2a;outline:none}
.adm-acts{display:flex;flex-direction:column;gap:4px;align-items:flex-end}
.link-pill{display:inline-flex;align-items:center;gap:2px;font-size:9px;padding:2px 6px;border:1px solid #e0ddd8;border-radius:2px;color:#aaa;letter-spacing:.04em;text-transform:uppercase}
.link-pill:hover{border-color:#1a1a1a;color:#1a1a1a}

/* ── LOGIN ── */
.login-wrap{display:flex;align-items:flex-start;justify-content:center;padding-top:1.5rem;padding-bottom:1.5rem}
.login-box{background:#fff;border:1px solid #e8e5e0;border-radius:2px;padding:2.5rem 2rem;width:100%;max-width:340px;text-align:center}
.login-box h2{font-size:12px;letter-spacing:.12em;text-transform:uppercase;font-weight:400;color:#999;margin-bottom:.4rem}
.login-box p{font-size:12px;color:#bbb;margin-bottom:1.75rem}
.login-box input{width:100%;font-size:13px;padding:10px 12px;border:1px solid #d8d4ce;border-radius:2px;background:#fff;color:#1a1a1a;margin-bottom:.75rem;outline:none}
.login-box input:focus{border-color:#1a1a1a}
.login-err{font-size:11px;color:#c06060;min-height:16px;margin-bottom:.625rem;letter-spacing:.03em}

/* ── MODAL INLINE (pas de fixed, compatible iframe mobile) ── */
.modal-inline{background:#fff;border:1px solid #e0ddd8;border-radius:3px;margin-bottom:1rem;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,.12);animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
/* Zoom photo */
.zoom-overlay{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:500;display:flex;align-items:center;justify-content:center;cursor:zoom-out;animation:fadeIn .15s ease}
.zoom-overlay img{max-width:92vw;max-height:88vh;object-fit:contain;border-radius:2px;box-shadow:0 8px 40px rgba(0,0,0,.5)}
.zoom-close{position:fixed;top:1.25rem;right:1.25rem;width:36px;height:36px;background:rgba(255,255,255,.15);border:none;border-radius:50%;color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.15s}
.zoom-close:hover{background:rgba(255,255,255,.3)}
.c-img-zoom{cursor:zoom-in}


/* ── DRAG & DROP ── */
.drop-zone{border:2px dashed #d8d4ce;border-radius:2px;padding:1.5rem 1rem;text-align:center;cursor:pointer;transition:.2s;background:#fafaf8;margin-bottom:.75rem;position:relative}
.drop-zone:hover,.drop-zone.drag-over{border-color:#1a1a1a;background:#f4f2ee}
.drop-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.drop-zone-icon{font-size:22px;color:#ccc;margin-bottom:.5rem}
.drop-zone-text{font-size:11px;letter-spacing:.05em;text-transform:uppercase;color:#bbb}
.drop-zone-hint{font-size:10px;color:#ccc;margin-top:.25rem}
.drop-preview{width:100%;height:120px;object-fit:contain;border-radius:2px;border:1px solid #eee;margin-bottom:.625rem;background:#f8f7f4;padding:6px}

/* ── ALERTS ── */
.alert{padding:.75rem 1rem;border-radius:2px;font-size:12px;margin-bottom:1rem;line-height:1.5;letter-spacing:.02em}
.alert-warn{background:#fdf8ee;color:#8a6a20;border:1px solid #f0e8cc}
.alert-info{background:#eef4fd;color:#2a5a8a;border:1px solid #ccddf0}
.alert-ok{background:#eefbee;color:#2a6a2a;border:1px solid #cceacc}

/* ── SÉLECTIONS CLIENTS ── */
.sel-card{background:#fff;border:1px solid #e8e5e0;border-radius:2px;padding:1.25rem;margin-bottom:1rem}
.sel-card-head{display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:1rem;padding-bottom:.875rem;border-bottom:1px solid #f0ede8}
.sel-card-name{font-size:15px;font-weight:500;color:#1a1a1a;margin-bottom:2px}
.sel-card-date{font-size:10px;color:#bbb;letter-spacing:.04em;text-transform:uppercase}
.sel-card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:.75rem}
.sel-card-item{text-align:center}
.sel-card-img{width:100%;height:75px;border-radius:2px;background:#f8f7f4;overflow:hidden;display:flex;align-items:center;justify-content:center;margin-bottom:5px;border:1px solid #eee}
.sel-card-img img{width:100%;height:100%;object-fit:contain;padding:4px}
.sel-card-pname{font-size:10px;font-weight:500;color:#333;line-height:1.3;margin-bottom:1px}
.sel-card-pcat{font-size:9px;color:#bbb;text-transform:uppercase;letter-spacing:.05em}

/* ── DOUBLONS ── */
.dup-badge{display:inline-block;background:#fff3cd;color:#856404;border:1px solid #ffc107;font-size:9px;padding:1px 7px;border-radius:2px;letter-spacing:.05em;margin-left:6px;vertical-align:middle}
.dup-item{border-left:3px solid #ffc107!important}
.dup-block{background:#fffbf0;border:1px solid #ffc107;border-radius:2px;padding:.875rem 1rem;margin-bottom:1rem}
.dup-block-title{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:#856404;margin-bottom:.625rem;font-weight:600}
.dup-row{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid #fde9a0;font-size:12px;color:#1a1a1a}
.dup-row:last-child{border:none;padding-bottom:0}
.dup-thumb{width:36px;height:36px;border-radius:2px;background:#f5f3ef;overflow:hidden;flex-shrink:0;border:1px solid #eee}
.dup-thumb img{width:100%;height:100%;object-fit:contain}

/* ── EMPTY ── */
.empty{text-align:center;padding:3rem;color:#ccc;font-size:11px;letter-spacing:.06em;text-transform:uppercase;grid-column:1/-1}

/* ── UPLOAD ZONE (scanner) ── */
.upload-zone{display:block;border:2px dashed #d8d4ce;border-radius:2px;padding:2rem 1rem;text-align:center;cursor:pointer;transition:.15s;background:#fafaf8;margin-bottom:.875rem;position:relative}
.upload-zone:hover{border-color:#1a1a1a;background:#f4f2ee}

/* ── RESPONSIVE ── */
@media(max-width:600px){
  .app{padding:0 0 1rem}
  .topbar{margin:0;border-radius:0;padding:.7rem .9rem;flex-wrap:wrap}
  .logo{font-size:17px;flex:1;min-width:0}
  .logo span{display:none}
  .nav{width:100%;flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;gap:2px;padding-bottom:2px}
  .nav::-webkit-scrollbar{display:none}
  .nb{padding:7px 12px;font-size:10px;flex-shrink:0}
  .grid{grid-template-columns:repeat(2,1fr);gap:.75rem;padding:0 .75rem}
  .filter-bar{padding:0 .75rem}
  .bbar{margin:0 .75rem 1rem;border-radius:2px}
  .btn{padding:7px 13px;font-size:10px}
  .adm-item{grid-template-columns:44px 1fr auto;gap:8px;padding:9px 10px}
  .adm-thumb{width:44px;height:44px}
  .modal-img{height:180px}
  .modal-body{padding:1rem 1.25rem 1.25rem}
  .stat-row{grid-template-columns:repeat(2,1fr)}
  .url-row input{min-width:150px}
  .scan-top{flex-direction:column;align-items:stretch}
  .section{border-radius:0;border-left:none;border-right:none}
}

/* ── NOUVEAUTÉS ── */
.new-section{margin-bottom:1.75rem}
.new-label{font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:#1a1a1a;font-weight:600;margin-bottom:.875rem;display:flex;align-items:center;gap:8px}
.new-label::after{content:'';flex:1;height:1px;background:#e8e5e0}
.badge-new{position:absolute;top:8px;left:8px;background:#1a1a1a;color:#fff;font-size:9px;letter-spacing:.06em;text-transform:uppercase;padding:3px 7px;font-family:inherit;font-weight:500;z-index:1}
.badge-custom{position:absolute;top:8px;right:8px;background:#c9a96e;color:#fff;font-size:9px;letter-spacing:.06em;text-transform:uppercase;padding:3px 7px;font-family:inherit;font-weight:500;z-index:1}
.badge-hidden-card{position:absolute;bottom:8px;left:8px;background:#7a7a7a;color:#fff;font-size:9px;letter-spacing:.06em;text-transform:uppercase;padding:3px 7px;font-family:inherit;font-weight:500;z-index:1}
.adm-new-btn{width:24px;height:24px;border-radius:50%;border:1px solid #ddd;background:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;transition:.2s;cursor:pointer;line-height:1;color:#ddd}
.adm-new-btn.on{border-color:#1a1a1a;background:#1a1a1a;color:#fff}
.adm-new-btn:hover:not(.on){border-color:#888;color:#888}
.adm-custom-btn{width:24px;height:24px;border-radius:50%;border:1px solid #ddd;background:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;transition:.2s;cursor:pointer;line-height:1;color:#ddd;font-family:inherit}
.adm-custom-btn.on{border-color:#c9a96e;background:#c9a96e;color:#fff}
.adm-custom-btn:hover:not(.on){border-color:#c9a96e;color:#c9a96e}
.adm-hidden-btn{width:24px;height:24px;border-radius:50%;border:1px solid #ddd;background:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;transition:.2s;cursor:pointer;line-height:1;color:#ddd}
.adm-hidden-btn.on{border-color:#7a7a7a;background:#7a7a7a;color:#fff}
.adm-hidden-btn:hover:not(.on){border-color:#7a7a7a;color:#7a7a7a}

/* ══ POLISH / MICRO-INTERACTIONS (ajouts non destructifs) ══ */
/* Apparition douce des images — se termine toujours en opacité 1 (aucun risque d'image invisible) */
.c-img img{animation:imgIn .5s ease}
@keyframes imgIn{from{opacity:0}to{opacity:1}}
/* Élévation des cartes au survol */
.card{transition:transform .2s ease,box-shadow .2s ease,border-color .2s ease}
.card:hover{transform:translateY(-3px)}
/* Retour tactile sur les éléments cliquables */
.btn:active{transform:translateY(1px)}
.add-btn:active{transform:scale(.88)}
.chip:active,.nb:active{transform:scale(.96)}
/* Animation à l'ajout d'une pièce au panier */
@keyframes pop{0%{transform:scale(1)}45%{transform:scale(1.3)}100%{transform:scale(1)}}
.add-btn.justadded{animation:pop .35s ease}
/* Pulsation du compteur de sélection */
@keyframes countPulse{0%{transform:scale(1)}40%{transform:scale(1.45);color:#c9a96e}100%{transform:scale(1)}}
.bbar-info strong.pulse{display:inline-block;animation:countPulse .45s ease}
/* Anneau de focus discret sur les champs (plus pro) */
.s-in:focus,.field input:focus,.field select:focus,.field textarea:focus,.url-row input:focus{box-shadow:0 0 0 3px rgba(26,26,26,.06)}
/* Squelette de chargement */
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.skel{background:linear-gradient(90deg,#ececec 25%,#f6f5f3 37%,#ececec 63%);background-size:200% 100%;animation:shimmer 1.5s ease infinite;border-radius:2px}
.skel-card{background:#fff;border:1px solid #e8e5e0;border-radius:2px;overflow:hidden}
.skel-img{width:100%;height:160px}
.skel-line{height:10px;margin:11px 12px;border-radius:2px}
.skel-line.short{width:45%}
/* Bouton « copier le code » */
.copy-code-btn{margin-top:.625rem;width:100%;padding:9px;font-size:11px;letter-spacing:.07em;text-transform:uppercase;border:1px solid #d8d4ce;border-radius:2px;background:#fff;color:#555;cursor:pointer;transition:.15s;font-family:inherit}
.copy-code-btn:hover{border-color:#1a1a1a;color:#1a1a1a}
.copy-code-btn.done{border-color:#6a9a6a;color:#2a6a2a;background:#f3faf3}

/* ════════════════════════════════════════════════════════════
   REDESIGN DYNAMIQUE — EXPÉRIENCE CLIENT V2
   ════════════════════════════════════════════════════════════ */
:root{--ink:#1a1a1a;--gold:#c9a96e;--gold-d:#b3914f;--line:#e7e2da}
body{background:radial-gradient(1200px 620px at 50% -12%,#fbfaf8,#f0ede7) fixed}
.app{max-width:1440px}

/* ── HERO ── */
.hero{position:relative;margin:0 -1rem 1.5rem;padding:2.75rem 1.75rem 2.5rem;background:#1f1d1b;overflow:hidden}
.hero-inner{position:relative;max-width:680px}
.hero-eyebrow{font-size:10px;letter-spacing:.28em;text-transform:uppercase;color:var(--gold);margin-bottom:.9rem}
.hero-title{font-size:35px;font-weight:300;letter-spacing:.005em;color:#fff;line-height:1.08;margin-bottom:.75rem}
.hero-title b{font-weight:600}
.hero-sub{font-size:13.5px;color:#c6c0b6;line-height:1.7;max-width:520px;font-weight:300;margin-bottom:1.6rem}
.hero-search{display:flex;gap:.6rem;flex-wrap:wrap}
.hero-search #search{flex:1;min-width:200px}
.hero-code{display:flex;gap:.5rem;flex:1;min-width:230px}
.hero-code #code-input{flex:1;min-width:120px}
.hero .s-in{border-radius:11px;padding:12px 16px;border-color:transparent;background:rgba(255,255,255,.96)}
.hero .s-in:focus{box-shadow:0 0 0 4px rgba(201,169,110,.28)}

/* ── BARRE SÉLECTION ── */
.bbar{background:#fff;border:1px solid var(--line);border-radius:13px;box-shadow:0 8px 24px -16px rgba(26,26,26,.3);padding:.9rem 1.15rem}
.bbar-info{font-size:12px}
.bbar-info strong{color:var(--ink);font-size:15px}

/* ── FILTRES ── */
.filter-bar{gap:8px;margin-bottom:1.6rem;padding-bottom:0;flex-wrap:wrap;overflow:visible}
.chip{padding:8px 16px;border-radius:30px;border-color:var(--line);font-size:11px;font-weight:500;background:#fff;color:#8a8378;box-shadow:0 1px 2px rgba(0,0,0,.02);transition:.2s}
.chip:hover:not(.active){border-color:var(--gold);color:var(--ink);transform:translateY(-1px)}
.chip.active{background:var(--ink);border-color:var(--ink);color:#fff;box-shadow:0 7px 16px -7px rgba(26,26,26,.5)}
.chip-n{opacity:.45;margin-left:6px;font-weight:400}
.chip.active .chip-n{opacity:.6}

/* ── GRILLE + CARTES ── */
.grid{grid-template-columns:repeat(auto-fill,minmax(235px,1fr));gap:1.4rem;margin-bottom:2rem}
@keyframes cardIn{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}
.card{background:#fff;border:1px solid #ece8e1;border-radius:14px;overflow:hidden;cursor:pointer;animation:cardIn .55s cubic-bezier(.2,.8,.2,1) backwards;transition:transform .35s cubic-bezier(.2,.8,.2,1),box-shadow .35s,border-color .35s}
.card:hover{transform:translateY(-7px);box-shadow:0 24px 46px -20px rgba(26,26,26,.3);border-color:#e3dbcb}
.card.sel{border-color:var(--ink);box-shadow:0 0 0 2px var(--ink)}
.c-img{height:215px;background:linear-gradient(135deg,#f8f6f2,#efebe4)}
.c-img img{padding:14px}
.card:hover .c-img img{transform:scale(1.06)}
.c-hover{position:absolute;inset:0;display:flex;align-items:flex-end;padding:15px;background:linear-gradient(to top,rgba(20,18,16,.6),rgba(20,18,16,.04) 55%,transparent);opacity:0;transition:.32s}
.card:hover .c-hover{opacity:1}
.c-hover-cta{color:#fff;font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;font-weight:500;transform:translateY(7px);transition:.32s .03s}
.card:hover .c-hover-cta{transform:translateY(0)}
.c-body{padding:14px 15px 15px;border-top:none}
.c-cat{font-size:9px;color:var(--gold-d);letter-spacing:.16em;margin-bottom:6px;font-weight:600}
.c-name{font-size:13px;font-weight:500;margin-bottom:6px}
.c-desc{font-size:11px;color:#9a948b;margin-bottom:12px}
.c-ref{font-size:9px;color:#c4bdb2;letter-spacing:.08em}
.add-btn{width:34px;height:34px;border-color:var(--line);box-shadow:0 2px 6px rgba(0,0,0,.05);font-size:18px}
.add-btn:hover{border-color:var(--ink);transform:scale(1.08)}
.add-btn.on{background:var(--ink);border-color:var(--ink)}
.new-label{font-size:10px;letter-spacing:.18em;color:var(--ink)}
.new-label::after{background:var(--line)}
.badge-new{border-radius:30px;padding:4px 10px}
.badge-custom{border-radius:30px;padding:4px 10px;background:linear-gradient(135deg,var(--gold),#e2c98f)}

/* ── FICHE PRODUIT ── */
.btn-back-nav{display:inline-flex;align-items:center;gap:7px;background:#fff;border:1px solid var(--line);cursor:pointer;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:#6a655d;font-family:inherit;padding:10px 17px;border-radius:30px;margin-bottom:1.6rem;transition:.2s;font-weight:500}
.btn-back-nav:hover{border-color:var(--ink);color:var(--ink);gap:11px}
@keyframes detailIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.detail{display:grid;grid-template-columns:1.05fr 1fr;gap:2.25rem;align-items:start;animation:detailIn .5s cubic-bezier(.2,.8,.2,1)}
.detail-img{position:relative;height:430px;background:linear-gradient(135deg,#f8f6f2,#ece7df);border:1px solid var(--line);border-radius:18px;overflow:hidden;display:flex;align-items:center;justify-content:center;cursor:zoom-in;box-shadow:0 26px 54px -30px rgba(26,26,26,.32)}
.detail-img img{width:100%;height:100%;object-fit:contain;padding:30px;transition:transform .45s}
.detail-img:hover img{transform:scale(1.05)}
.detail-img .zoom-hint{position:absolute;bottom:15px;right:15px;background:rgba(26,26,26,.8);color:#fff;font-size:9px;letter-spacing:.1em;text-transform:uppercase;padding:6px 12px;border-radius:20px;opacity:0;transition:.3s}
.detail-img:hover .zoom-hint{opacity:1}
.detail-ph{font-size:11px;color:#c9c2b6;letter-spacing:.1em;text-transform:uppercase}
.detail-info{padding-top:.4rem}
.detail-badges{display:flex;gap:7px;margin-bottom:1.1rem;flex-wrap:wrap}
.detail-badge{font-size:9.5px;letter-spacing:.08em;text-transform:uppercase;padding:5px 12px;border-radius:20px;font-weight:600}
.db-new{background:var(--ink);color:#fff}
.db-custom{background:linear-gradient(135deg,var(--gold),#e2c98f);color:#fff}
.detail-cat{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--gold-d);font-weight:600;margin-bottom:.65rem}
.detail-title{font-size:31px;font-weight:300;line-height:1.14;letter-spacing:.005em;margin-bottom:.7rem;color:var(--ink)}
.detail-ref{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:#b8b1a6;margin-bottom:1.6rem}
.detail-desc{font-size:14px;line-height:1.8;color:#5d574f;margin-bottom:2rem;font-weight:300}
.detail-cta{width:100%;padding:16px;border:none;border-radius:12px;background:var(--ink);color:#fff;font-family:inherit;font-size:12px;letter-spacing:.12em;text-transform:uppercase;font-weight:500;cursor:pointer;transition:.25s;box-shadow:0 14px 30px -14px rgba(26,26,26,.55)}
.detail-cta:hover{transform:translateY(-2px);box-shadow:0 20px 38px -14px rgba(26,26,26,.6)}
.detail-cta.on{background:#fff;color:var(--ink);border:1.5px solid var(--ink);box-shadow:none}
.detail-note{font-size:11.5px;color:#a8a298;margin-top:.95rem;text-align:center;letter-spacing:.02em}
.detail-sel-link{width:100%;margin-top:.8rem;padding:13px;background:transparent;border:1px solid var(--line);border-radius:12px;color:#6a655d;font-family:inherit;font-size:11.5px;letter-spacing:.1em;text-transform:uppercase;font-weight:500;cursor:pointer;transition:.2s}
.detail-sel-link:hover{border-color:var(--ink);color:var(--ink)}

/* ── SIMILAIRES ── */
.similar{margin-top:3rem}
.similar-head{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink);font-weight:600;margin-bottom:1.1rem;display:flex;align-items:center;gap:9px}
.similar-head::after{content:'';flex:1;height:1px;background:var(--line)}
.similar-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:1rem}
.sim-card{background:#fff;border:1px solid #ece8e1;border-radius:12px;overflow:hidden;cursor:pointer;transition:.3s}
.sim-card:hover{transform:translateY(-5px);box-shadow:0 18px 34px -18px rgba(26,26,26,.26);border-color:#e3dbcb}
.sim-img{height:128px;background:linear-gradient(135deg,#f8f6f2,#efebe4);display:flex;align-items:center;justify-content:center;overflow:hidden}
.sim-img img{width:100%;height:100%;object-fit:contain;padding:12px}
.sim-body{padding:10px 11px 12px}
.sim-cat{font-size:8.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold-d);font-weight:600;margin-bottom:4px}
.sim-name{font-size:11.5px;font-weight:500;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}

/* ── ADMIN : polish + actions groupées ── */
.stat{border-radius:11px}
.stat-clk{cursor:pointer;transition:border-color .15s,background .15s,transform .15s}
.stat-clk:hover{border-color:var(--gold);transform:translateY(-1px)}
.stat-on{border-color:var(--ink);background:var(--ink)}
.stat-on .stat-l{color:#9a948b}
.stat-on .stat-v{color:#fff}
.adm-item{border-radius:11px}
.adm-thumb,.adm-cb{border-radius:8px}
.bulk-bar{display:flex;flex-wrap:wrap;align-items:center;gap:7px;background:var(--ink);border-radius:12px;padding:.7rem .9rem;margin-bottom:1rem;box-shadow:0 10px 26px -16px rgba(26,26,26,.5)}
.bulk-bar .bulk-count{color:#fff;font-size:10px;letter-spacing:.08em;text-transform:uppercase;margin-right:4px;font-weight:500}
.bulk-bar .btn-xs{background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.22);color:#eee}
.bulk-bar .btn-xs:hover{background:rgba(255,255,255,.2);border-color:#fff;color:#fff}
.bulk-bar .btn-xs.del{background:rgba(192,96,96,.2);border-color:rgba(192,96,96,.5);color:#f0b4b4}
.bulk-bar .btn-xs.del:hover{background:rgba(192,96,96,.35);color:#fff}
.bulk-sel{padding:6px 10px;border-radius:7px;border:1px solid rgba(255,255,255,.22);background:#2b2926;color:#eee;font-family:inherit;font-size:11px;outline:none;cursor:pointer}
/* Toggles de statut en ligne (Nouveauté / Personnalisable / Visible) */
.adm-toggles{display:flex;gap:6px;flex-wrap:wrap;margin-top:9px}
.adm-tg{display:inline-flex;align-items:center;gap:5px;padding:5px 11px;border:1px solid #e0ddd8;border-radius:20px;background:#fff;color:#9a948b;font-size:10px;letter-spacing:.03em;font-family:inherit;cursor:pointer;transition:.15s;line-height:1.1}
.adm-tg b{font-size:11px;font-weight:700}
.adm-tg:hover{border-color:#999;color:#444}
.tg-new.on{border-color:#1a1a1a;background:#1a1a1a;color:#fff}
.tg-custom.on{border-color:#c9a96e;background:#c9a96e;color:#fff}
.tg-hidden.on{border-color:#7a7a7a;background:#7a7a7a;color:#fff}
.sc-cat-sel{font-family:inherit;font-size:10px;padding:3px 7px;border:1px solid #d8d4ce;border-radius:6px;background:#fff;color:#555;outline:none;cursor:pointer;max-width:160px}
.sc-cat-sel:hover{border-color:#1a1a1a}
.sc-price-edit{font-size:10px;color:#888;display:inline-flex;align-items:center;gap:4px}
.sc-price-inp{width:64px;font-family:inherit;font-size:11px;padding:3px 6px;border:1px solid #d8d4ce;border-radius:6px;background:#fff;color:#1a1a1a;outline:none}
.sc-price-inp:focus{border-color:#1a1a1a}

/* ── IMPORT / SCANNER : design ── */
.section{border-radius:14px;border-color:var(--line);box-shadow:0 8px 24px -18px rgba(26,26,26,.22)}
.sec-title{color:#1a1a1a;font-weight:600}
.mode-pills{gap:7px}
.mode-pill{border-radius:30px;padding:8px 15px;border-color:var(--line);color:#8a8378;font-weight:500;transition:.18s}
.mode-pill:hover:not(.active){border-color:var(--gold);color:var(--ink);transform:translateY(-1px)}
.mode-pill.active{background:var(--ink);border-color:var(--ink);color:#fff;box-shadow:0 6px 16px -8px rgba(26,26,26,.5)}
.url-row input,.ship-row input{border-radius:10px;border-color:var(--line)}
.url-row input:focus,.ship-row input:focus{box-shadow:0 0 0 3px rgba(201,169,110,.12)}
.section .btn-p{border-radius:10px}
.upload-zone{border-radius:14px;border-color:var(--line);background:#faf9f6;padding:2.25rem 1.25rem}
.upload-zone:hover,.upload-zone.drag-over{border-color:var(--ink);background:#f4f2ee}
.upload-zone.drag-over{box-shadow:0 0 0 4px rgba(201,169,110,.15)}
.drop-zone{border-radius:12px;border-color:var(--line)}
.paste-hint{display:inline-flex;align-items:center;gap:6px;font-size:10px;letter-spacing:.04em;color:#9a948b;background:#f1ede6;border:1px solid var(--line);border-radius:20px;padding:4px 11px;margin-top:.75rem}
.paste-hint kbd{font-family:inherit;font-size:9px;background:#fff;border:1px solid #d8d4ce;border-bottom-width:2px;border-radius:4px;padding:1px 5px;color:#555}
.scan-steps{counter-reset:step;list-style:none;margin:0 0 1rem;padding:0}
.scan-steps li{position:relative;padding:0 0 0 30px;margin-bottom:.55rem;font-size:11.5px;color:#666;line-height:1.6}
.scan-steps li::before{counter-increment:step;content:counter(step);position:absolute;left:0;top:0;width:20px;height:20px;border-radius:50%;background:var(--ink);color:#fff;font-size:10px;font-weight:600;display:flex;align-items:center;justify-content:center}

/* ── OPTIMISEUR D'ACHATS ── */
.sels-top{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;margin-bottom:.4rem}
.sels-top-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
#purchase-btn:disabled{opacity:.4;cursor:not-allowed}
.sel-pick{width:22px;height:22px;border:1px solid #d8d4ce;border-radius:6px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:.15s;background:#fff}
.sel-pick:hover{border-color:#1a1a1a}
.sel-pick.on{background:#1a1a1a;border-color:#1a1a1a}
.sel-pick.on::after{content:'✓';color:#fff;font-size:12px;font-weight:600}
.sel-card-picked{border-color:#1a1a1a !important;box-shadow:0 0 0 2px rgba(26,26,26,.12)}
.purchase-head{background:linear-gradient(135deg,#211e1b,#2d2825);border-radius:14px;padding:1.5rem;color:#fff;margin-bottom:1.5rem}
.purchase-title{font-size:21px;font-weight:300;margin-bottom:.35rem}
.purchase-sub{font-size:11px;letter-spacing:.05em;text-transform:uppercase;color:#bbb;margin-bottom:1rem}
.purchase-totals{display:flex;gap:18px;flex-wrap:wrap;font-size:12px;color:#ddd}
.purchase-totals strong{color:#fff;font-size:14px}
.purchase-section-title{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#1a1a1a;font-weight:600;margin:1.5rem 0 .85rem}
.supplier-block{background:#fff;border:1px solid #e7e2da;border-radius:12px;padding:1rem 1.1rem;margin-bottom:1rem}
.supplier-head{display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap;padding-bottom:.7rem;margin-bottom:.4rem;border-bottom:1px solid #f0ede8}
.supplier-name{font-size:14px;font-weight:600;color:#1a1a1a}
.supplier-count{font-size:10px;font-weight:400;color:#aaa;letter-spacing:.04em;margin-left:6px}
.buy-row{display:flex;align-items:center;gap:12px;padding:9px 4px;border-bottom:1px solid #f4f2ee}
.buy-row:last-child{border-bottom:none}
.buy-row.bought{opacity:.5}
.buy-row.bought .buy-name{text-decoration:line-through}
.buy-check{width:22px;height:22px;border:1px solid #d8d4ce;border-radius:6px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:#fff;transition:.15s;background:#fff}
.buy-check.on{background:#2a6a2a;border-color:#2a6a2a}
.buy-check:hover{border-color:#1a1a1a}
.buy-thumb{width:46px;height:46px;border-radius:8px;background:#f6f4f0;border:1px solid #eee;overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.buy-thumb img{width:100%;height:100%;object-fit:contain;padding:3px}
.buy-info{flex:1;min-width:0}
.buy-name{font-size:12.5px;font-weight:500;color:#1a1a1a}
.buy-qty{background:#1a1a1a;color:#fff;font-size:9px;padding:1px 6px;border-radius:10px;margin-left:4px;vertical-align:middle}
.buy-meta{font-size:10px;color:#a8a298;margin-top:2px}
.buy-price{font-size:12px;font-weight:600;color:#1a1a1a;text-align:right;white-space:nowrap}
.buy-price .buy-unit{display:block;font-size:9px;font-weight:400;color:#bbb}

/* ══ AI PROXY ══ */
async function callAI({ system, messages, max_tokens, useSearch, image, model }) {
  const r = await fetch('/api/ai-proxy', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ system, messages, max_tokens, useSearch, image, model }),
  });
  const data = await r.json().catch(() => ({}));
  if (!r.ok) throw new Error(data.error || `Erreur proxy HTTP ${r.status}`);
  if (data.error) throw new Error(data.error);
  console.log('[IA] réponse :', data.text?.slice(0, 120));
  return data;
}

/* ══ HELPER ══ */
function extractText(data) { return data?.text?.trim() || null; }

/* ══ DESCRIPTION + TITRE IA ══ */
async function generateDesc(name, rawDesc, cat) {
  const system = 'Tu es un expert horloger qui renomme et décrit des pièces de montres custom (mods Seiko) pour un catalogue en français.\n'
    +'Réponds UNIQUEMENT par un objet JSON valide, sans markdown, exactement au format : {"titre":"...","description":"..."}\n'
    +'- titre : 5 mots maximum en français (type + style + couleur), SANS dimensions (mm), SANS NH35/NH36/ETA, SANS les mots Movement/Lume/Automatic.\n'
    +'- description : UNE phrase sobre en français (15 à 25 mots), sans prix.\n'
    +'Exemple pour "Sunburst Dial Refraction 28.5mm gradient red NH35" → {"titre":"Cadran sunburst rouge gradué","description":"Cadran à finition soleillée avec effet de réfraction, dégradé rouge, compatible avec les mouvements NH35."}';
  const userMsg = 'Pièce : '+name+(rawDesc?(' | Détails : '+String(rawDesc).slice(0,400)):'')+' | Catégorie : '+cat;
  function parseOut(txt){
    if(!txt) return null;
    // 1) JSON prioritaire
    var m = txt.replace(/```json|```/g,'').match(/\{[\s\S]*\}/);
    if(m){ try{ var o=JSON.parse(m[0]); var t=(o.titre||o.title||'').trim(); var d=(o.description||o.desc||'').trim(); if(t||d) return {title:t||name, desc:d}; }catch(e){} }
    // 2) Repli : 2 lignes
    var lines = txt.split('\n').map(function(l){ return l.replace(/^(LIGNE\d+|titre|description|title|desc)\s*[:\-]?\s*/i,'').trim(); }).filter(function(l){ return l.length>2; });
    if(lines.length){ return { title: lines[0]||name, desc: lines.slice(1).join(' ') }; }
    return null;
  }
  for(var attempt=0; attempt<2; attempt++){
    try{
      const data = await callAI({
        system: system,
        messages: [{ role:'user', content: userMsg }],
        max_tokens: 300,
        model: 'claude-haiku-4-5-20251001',
      });
      const txt = (extractText(data) || '').trim();
      const out = parseOut(txt);
      if(out && (out.title || out.desc)) return out;
    }catch(err){
      console.error('[generateDesc] tentative '+(attempt+1)+' échouée:', err.message);
      window._aiLastError = err.message || 'erreur IA';
      if(attempt===0) await new Promise(function(r){setTimeout(r,800);}); // petite pause puis 1 retry
    }
  }
  return { title: name, desc: '' };
}

/* ══ DETECT SITE TYPE ══ */
function detectUrlType(url) {
  try {
    const u = new URL(url);
    const h = u.hostname.replace('www.','');
    if (u.pathname.match(/\/collections\/[^\/\?]+/)) return { type:'shopify', hostname:h, cleanHost:`https://${u.hostname}`, collection:u.pathname.match(/\/collections\/([^\/\?]+)/)[1] };
    // Produit Shopify individuel : /products/nom ou /fr/products/nom
    const prodMatch = u.pathname.match(/\/products\/([^\/\?]+)/);
    if (prodMatch) return { type:'shopify_product', hostname:h, cleanHost:`https://${u.hostname}`, handle:prodMatch[1] };
    // Recherche Shopify : /search?q=... ou /fr/search?q=...
    if (u.pathname.includes('/search') && u.searchParams.get('q')) {
      return { type:'shopify_search', hostname:h, cleanHost:`https://${u.hostname}`, query:u.searchParams.get('q') };
    }
    if (h.includes('aliexpress')) {
      const m = url.match(/\/item\/(\d+)/);
      if (m) return { type:'aliexpress', itemId:m[1] };
      return { type:'aliexpress_unknown' };
    }
    return { type:'unknown' };
  } catch { return { type:'unknown' }; }
}

async function fetchShopify(info) {
  // Pagination : max 250 par page, on récupère toutes les pages
  let all = [];
  let page = 1;
  while(true) {
    const r = await fetch(info.cleanHost+'/collections/'+info.collection+'/products.json?limit=250&page='+page);
    if (!r.ok) throw new Error('API Shopify inaccessible');
    const d = await r.json();
    const prods = d.products||[];
    all = all.concat(prods);
    setSt('Chargement... '+all.length+' produits récupérés','loading');
    if(prods.length < 250) break; // dernière page
    page++;
    if(page > 20) break; // sécurité max 5000 produits
  }
  return all;
}

async function fetchShopifySearch(info) {
  let all = [];
  let page = 1;
  const queryRaw = (info.query||'').replace(/\+/g,' ').toLowerCase();
  const words = queryRaw.split(/\s+/).filter(w => w.length > 1);
  if (!words.length) throw new Error('Requête de recherche vide');
  setSt('Recherche "'+queryRaw+'" sur le site...','loading');
  while (true) {
    const r = await fetch(info.cleanHost+'/products.json?limit=250&page='+page);
    if (!r.ok) throw new Error('API Shopify inaccessible (recherche)');
    const d = await r.json();
    const prods = d.products || [];
    const matched = prods.filter(p => {
      const text = (p.title+' '+(p.body_html||'')+' '+(p.tags||[]).join(' ')+' '+(p.product_type||'')+' '+(p.vendor||'')).toLowerCase();
      return words.every(w => text.includes(w));
    });
    all = all.concat(matched);
    setSt('Recherche... '+all.length+' correspondance'+(all.length>1?'s':'')+' (page '+page+' scannée)','loading');
    if (prods.length < 250) break;
    page++;
    if (page > 20) break;
  }
  return all;
}

async function fetchShopifyProduct(info) {
  // Produit individuel : récupère toutes les variantes
  const r = await fetch(`${info.cleanHost}/products/${info.handle}.json`);
  if (!r.ok) throw new Error('Produit Shopify introuvable');
  const d = await r.json();
  const p = d.product;
  if (!p) throw new Error('Format produit invalide');
  // Créer un item par variante (couleur, finition...)
  const items = [];
  const baseImg = p.images?.[0]?.src || '';
  // Grouper les variantes par première option (ex: couleur)
  const seen = new Set();
  for (const v of (p.variants||[])) {
    const label = v.option1 || v.title;
    if (seen.has(label)) continue;
    seen.add(label);
    // Trouver l'image correspondant à cette variante
    const variantImg = p.images?.find(img => img.variant_ids?.includes(v.id))?.src || baseImg;
    items.push({
      title: p.title + (label && label!=='Default Title' ? ' — '+label : ''),
      images: variantImg ? [{src: variantImg}] : [],
      variants: [v],
      body_html: p.body_html || '',
      handle: p.handle,
    });
  }
  return items.length ? items : [p];
}

function detectCat(name) {
  const nl = (name||'').toLowerCase();
  for (const [k,v] of Object.entries(CAT_MAP)) if (nl.includes(k)) return v;
  return 'Autre';
}

function parsePrice(val){
  if(!val) return 0;
  var s = String(val).trim();
  // Supprimer tous les symboles monétaires et espaces
  s = s.replace(/[₱$€£¥₩฿₫]/g,'').replace(/\s/g,'').trim();
  if(!s) return 0;
  // Virgule ET point présents
  if(s.indexOf(',')!==-1 && s.indexOf('.')!==-1){
    if(s.lastIndexOf('.')>s.lastIndexOf(',')) s=s.replace(/,/g,''); // 1,234.56 → 1234.56
    else s=s.replace(/\./g,'').replace(',','.');                    // 1.234,56 → 1234.56
  } else if(s.indexOf(',')!==-1){
    var parts=s.split(',');
    var after=parts[parts.length-1];
    if(after.length===2) s=s.replace(',','.');      // 39,90 → 39.90
    else if(after.length===3) s=s.replace(/,/g,''); // 1,850 → 1850
    else s=s.replace(',','.');
  } else if(s.indexOf('.')!==-1){
    var dparts=s.split('.');
    if(dparts[dparts.length-1].length===3) s=s.replace(/\./g,''); // 1.850 → 1850
  }
  var n=parseFloat(s);
  if(isNaN(n)) return 0;
  // Centimes Shopify : entier sans décimale dans la valeur originale ET > 100
  var origClean=String(val).replace(/[₱$€£¥₩฿₫\s,]/g,'');
  if(Number.isInteger(n) && n>100 && origClean.indexOf('.')===-1){
    // Vérifier si c'est vraiment des centimes (divisible par 5, commun en e-commerce)
    // Heuristique : si > 500 et pas de décimale → probablement centimes
    if(n>500) n=n/100;
  }
  return Math.round(n*100)/100;
}

function shopifyToRaw(products, supplier, eurRate) {
  eurRate = eurRate || 1;
  return products.map(p => ({
    name: p.title,
    cat: detectCat(p.title),
    rawDesc: (p.body_html||'').replace(/<[^>]+>/g,' ').replace(/\s+/g,' ').trim(),
    img: p.images?.[0]?.src || '',
    url: `https://${supplier.replace('www.','')}${p.handle?'/products/'+p.handle:''}`,
    price: Math.round(parsePrice(p.variants?.[0]?.price||0) * eurRate * 100) / 100,
    supplier,
  }));
}

async function resizeImage(file, maxWidth=1280) {
  return new Promise((resolve) => {
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = () => {
      const scale = Math.min(1, maxWidth / img.width);
      const canvas = document.createElement('canvas');
      canvas.width = Math.round(img.width * scale);
      canvas.height = Math.round(img.height * scale);
      canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
      URL.revokeObjectURL(url);
      resolve(canvas.toDataURL('image/jpeg', 0.85).split(',')[1]);
    };
    img.src = url;
  });
}

Prends le prix unitaire le plus bas visible. Commence directement par {`,

Catégories : Cadran, Boîtier, Bracelet, Mouvement, Couronne, Fond, Verre, Lunette, Aiguilles, Rotor, Autre.

Max 20 produits. Commence directement par [.`,
    messages: [{ role:'user', content:`Catalogue à scanner : ${url}` }],

  const counts = {};
  visibleItems.forEach(function(i){ counts[i.cat] = (counts[i.cat]||0)+1; });

    html += '<div class="stat-chip">'+c+' : <strong>'+counts[c]+'</strong></div>';
  });
  html += '</div>';
  return html;
}

function shuffleByCategory(arr){
  // Regroupe par catégorie puis alterne : 1 cadran, 1 boitier, 1 lunette...
  var groups={};
  arr.forEach(function(i){
    var k=i.cat||'Autre';
    if(!groups[k]) groups[k]=[];
    groups[k].push(i);
  });
  var keys=Object.keys(groups);
  var result=[];
  var maxLen=Math.max.apply(null,keys.map(function(k){return groups[k].length;}));
  for(var idx=0;idx<maxLen;idx++){
    keys.forEach(function(k){
      if(groups[k][idx]) result.push(groups[k][idx]);
    });
  }
  return result;
}

function buildCards(){
  // NB: ne filtre PAS par texte. Le filtrage recherche se fait en CSS (applySearchFilter)
  var list=items.filter(function(i){
    if(i.hidden && !isAdmin) return false; // masquées : invisibles client, visibles admin
    return (filterCat==='Tout'||i.cat===filterCat);
  });
  if(filterCat==='Tout') list=shuffleByCategory(list);
  if(!list.length) return '<div class="empty">Aucune pièce</div>';
  function oneCard(i, idx){
    var sel=basket.has(i.id);
    var altTxt=((i.name||'')+(i.cat?' — '+i.cat:'')).replace(/"/g,'');
    var imgH=i.img?('<img src="'+i.img+'" alt="'+altTxt+'" loading="lazy" onerror="this.style.display=\'none\'">'):('<span class="c-img-ph">Aucune photo</span>');

    var searchData=((i.name||'')+' '+(i.description||'')+' '+(i.cat||'')).toLowerCase().replace(/"/g,'');
    var delay=Math.min(idx||0,12)*35;
    return '<div class="card'+(sel?' sel':'')+'" id="crd-'+i.id+'" data-search="'+searchData+'" style="position:relative;animation-delay:'+delay+'ms">'
      +nb+pc+hd
      +'<div class="c-img" onclick="openModal(\''+i.id+'\')">'+imgH
      +'<div class="c-hover"><span class="c-hover-cta">Voir le détail &#8594;</span></div></div>'
      +'<div class="c-body"><div class="c-cat">'+(i.cat||'')+'</div>'
      +'<div class="c-name" onclick="openModal(\''+i.id+'\')">'+i.name+'</div>'
      +'<div class="c-desc">'+(i.description||'')+'</div>'
      +'<div class="c-foot"><span class="c-ref">réf. '+String(i.id).slice(-4).toUpperCase()+'</span>'+btn+'</div>'
      +'</div></div>';
  }
  var news=list.filter(function(i){return i.is_new;});
  var rest=list.filter(function(i){return !i.is_new;});
  var html='';
  if(news.length){
    html+='<div class="new-section" id="sec-news"><div class="new-label">Nouveautés</div><div class="grid" style="margin-bottom:0">'+news.map(oneCard).join('')+'</div></div>';
    if(rest.length) html+='<div class="new-label" id="sec-cat-label" style="margin-bottom:.875rem">Catalogue</div>';
  }
  html+='<div class="grid">'+rest.map(oneCard).join('')+'</div>';
  html+='<div class="empty" id="search-empty" style="display:none">Aucune pièce ne correspond à votre recherche</div>';
  return html;
}

// Filtrage de recherche en CSS pur (sans reconstruire le DOM = pas de perte de focus)
function applySearchFilter(){
  var q=(searchQuery||'').toLowerCase().trim();
  var cards=document.querySelectorAll('#g-client .card[data-search]');
  var visibleCount=0;
  cards.forEach(function(card){
    var match = !q || card.getAttribute('data-search').includes(q);
    card.style.display = match ? '' : 'none';
    if(match) visibleCount++;
  });
  // Masquer les sections Nouveautés/Catalogue pendant une recherche active
  var secNews=document.getElementById('sec-news');
  var secLabel=document.getElementById('sec-cat-label');
  if(q){
    if(secNews){ var nv=secNews.querySelectorAll('.card[data-search]'); var anyNews=false; nv.forEach(function(c){if(c.style.display!=='none')anyNews=true;}); secNews.querySelector('.new-label').style.display=anyNews?'':'none'; }
    if(secLabel) secLabel.style.display='none';
  } else {
    if(secNews){ var nl=secNews.querySelector('.new-label'); if(nl) nl.style.display=''; }
    if(secLabel) secLabel.style.display='';
  }
  // Message "aucun résultat"
  var emptyEl=document.getElementById('search-empty');
  if(emptyEl) emptyEl.style.display = (visibleCount===0 && q) ? '' : 'none';
}

function generateClientCode(){
  const chars='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let code='BANG-';
  for(let i=0;i<4;i++) code+=chars.charAt(Math.floor(Math.random()*chars.length));
  return code;
}

// Copie un code dans le presse-papiers (avec repli compatible iframe)
function copyCode(code, btn){
  function done(){ if(btn){ btn.textContent='Copié ✓'; btn.classList.add('done'); setTimeout(function(){ if(btn){ btn.textContent='Copier le code'; btn.classList.remove('done'); } },2000); } }
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(code).then(done).catch(function(){ fallbackCopy(code); done(); });
  } else { fallbackCopy(code); done(); }
}
function fallbackCopy(text){
  try{ var ta=document.createElement('textarea'); ta.value=text; ta.style.position='fixed'; ta.style.opacity='0'; document.body.appendChild(ta); ta.focus(); ta.select(); document.execCommand('copy'); document.body.removeChild(ta); }catch(e){}
}

async function loadByCode(){
  const code=(codeInput||'').trim().toUpperCase();
  const status=document.getElementById('code-status');
  if(!code){ if(status) status.innerHTML='<span style="color:#c06060">Entrez un code BANG-XXXX</span>'; return; }
  if(!code.startsWith('BANG-')||code.length!==9){ if(status) status.innerHTML='<span style="color:#c06060">Code invalide. Format attendu : BANG-XXXX</span>'; return; }
  if(status) status.innerHTML='<span style="color:#999">Recherche en cours...</span>';
  if(!isConfigured()){ if(status) status.innerHTML='<span style="color:#c06060">Supabase non configuré.</span>'; return; }
  try {
    const r=await fetch(SB.u('selections?client_code=eq.'+encodeURIComponent(code)),{headers:SB.h()});
    if(!r.ok) throw new Error('Erreur réseau');
    const data=await r.json();
    if(!data.length){ if(status) status.innerHTML='<span style="color:#c06060">Code introuvable. Vérifiez votre saisie.</span>'; return; }
    const sel=data[0];
    const itemIds=JSON.parse(sel.item_ids||'[]');
    basket=new Set(itemIds);
    currentSelectionId=sel.id;
    codeInput='';
    if(status) status.innerHTML='<span style="color:#6a9a6a">✓ Sélection de <strong>'+sel.client_name+'</strong> chargée — '+itemIds.length+' pièce'+(itemIds.length>1?'s':'')+'. Modifiez puis enregistrez.</span>';
    refreshCards();
    updateBasketUI();
    const ci=document.getElementById('code-input'); if(ci) ci.value='';
    setTimeout(showSel,500);
  } catch(err) {
    if(status) status.innerHTML='<span style="color:#c06060">Erreur : '+err.message+'</span>';
  }
}

/* ══ ASSORTIMENT — logique de montre custom (mod Seiko) ══ */
// Pour chaque type de pièce, les pièces qui composent naturellement la montre avec.
// Base : un mod Seiko s'articule autour de Boîtier + Cadran + Aiguilles + Lunette/Insert + Bracelet.
const WATCH_COMPLEMENTS = {
  'Cadran':       ['Aiguilles','Boîtier','Insert lunette','Lunette','Bracelet'],
  'Boîtier':      ['Cadran','Aiguilles','Lunette','Insert lunette','Bracelet','Verre'],
  'Aiguilles':    ['Cadran','Boîtier','Insert lunette','Bracelet'],
  'Lunette':      ['Insert lunette','Boîtier','Cadran','Bracelet'],
  'Insert lunette':['Lunette','Boîtier','Cadran','Aiguilles'],
  'Bracelet':     ['Boîtier','Cadran','Aiguilles','Lunette'],
  'Verre':        ['Boîtier','Lunette','Cadran'],
  'Couronne':     ['Boîtier','Cadran','Tube couronne'],
  'Mouvement':    ['Cadran','Aiguilles','Rotor','Fond'],
  'Rotor':        ['Mouvement','Fond','Boîtier'],
  'Fond':         ['Boîtier','Mouvement','Rotor'],
  'Anneau':       ['Cadran','Boîtier','Lunette'],
  'Tube couronne':['Couronne','Boîtier']
};
// Ramène une catégorie (FR ou EN, avec ou sans accent) vers une clé canonique
function canonCat(c){
  var s=(c||'').toLowerCase();
  function has(){ for(var i=0;i<arguments.length;i++){ if(s.indexOf(arguments[i])!==-1) return true; } return false; }
  if(has('insert')) return 'Insert lunette';
  if(has('chapter','rehaut','anneau')) return 'Anneau';
  if(has('lunette','bezel')) return 'Lunette';
  if(has('rotor')) return 'Rotor';
  if(has('aiguille','hand')) return 'Aiguilles';
  if(has('cadran','dial')) return 'Cadran';
  if(has('caseback','case back','fond')) return 'Fond';
  if(has('boit','boît','case')) return 'Boîtier';
  if(has('bracelet','strap','band','clasp')) return 'Bracelet';
  if(has('verre','crystal','glass','sapphire','saphir')) return 'Verre';
  if(has('tube')) return 'Tube couronne';
  if(has('couronne','crown')) return 'Couronne';
  if(has('mouvement','movement','nh3','calib')) return 'Mouvement';
  return c||'Autre';
}
function shuffleArr(a){ a=a.slice(); for(var i=a.length-1;i>0;i--){ var j=Math.floor(Math.random()*(i+1)); var t=a[i]; a[i]=a[j]; a[j]=t; } return a; }
// Suggestions d'assortiment : pièces complémentaires (pas la même catégorie), variées
function buildSuggestions(item){
  var avail=items.filter(function(x){ return x.id!==item.id && (isAdmin||!x.hidden); });
  var byCat={};
  avail.forEach(function(x){ var k=canonCat(x.cat); (byCat[k]=byCat[k]||[]).push(x); });
  Object.keys(byCat).forEach(function(k){ byCat[k]=shuffleArr(byCat[k]); });
  var key=canonCat(item.cat);
  var order=WATCH_COMPLEMENTS[key]||['Cadran','Boîtier','Aiguilles','Bracelet','Lunette'];
  var picks=[], used={};
  // Tour de table entre catégories complémentaires (1 de chaque, puis on recommence)
  var idx=0, guard=0;
  while(picks.length<8 && guard<80){
    guard++;
    var cat=order[idx%order.length]; idx++;
    var pool=byCat[cat];
    if(pool && pool.length){ var next=pool.shift(); if(next && !used[next.id]){ used[next.id]=1; picks.push(next); } }
    if(idx%order.length===0 && !order.some(function(c){return byCat[c]&&byCat[c].length;})) break;
  }
  // Compléter si besoin (même catégorie, puis le reste)
  if(picks.length<8){ (byCat[key]||[]).forEach(function(x){ if(picks.length<8 && !used[x.id]){ used[x.id]=1; picks.push(x); } }); }
  if(picks.length<4){ avail.forEach(function(x){ if(picks.length<8 && !used[x.id]){ used[x.id]=1; picks.push(x); } }); }
  return picks.slice(0,8);
}

async function doScan(){
  document.getElementById('bscan').disabled=true;
  document.getElementById('scan-res').innerHTML='';
  scanRes=[]; scanChecked.clear();
  window._aiLastError=null;
  try {
    let rawItems=[];
    if(scanMode==='shopify'){
      const url=document.getElementById('scan-url').value.trim();
      if(!url){setSt('Collez une URL de collection.','err');document.getElementById('bscan').disabled=false;return;}
      setSt('Connexion à l\'API Shopify...','loading');
      const info=detectUrlType(url);
      if(info.type==='shopify'){
        const eurRate = parseFloat(document.getElementById('conv-rate')?.value||'1')||1;
        const prods=await fetchShopify(info);
        if(!prods.length){setSt('Aucun produit trouvé dans cette collection.','err');document.getElementById('bscan').disabled=false;return;}
        rawItems=shopifyToRaw(prods, info.hostname, eurRate);
      } else if(info.type==='shopify_product'){
        window._eurRate = parseFloat(document.getElementById('conv-rate')?.value||'1')||1;
        setSt('Produit individuel détecté — récupération des variantes...','loading');
        const prods=await fetchShopifyProduct(info);
        if(!prods.length){setSt('Aucune variante trouvée.','err');document.getElementById('bscan').disabled=false;return;}
        rawItems=shopifyToRaw(prods, info.hostname);
      } else if(info.type==='shopify_search'){
        const prods=await fetchShopifySearch(info);
        if(!prods.length){setSt('Aucun produit ne correspond à cette recherche.','err');document.getElementById('bscan').disabled=false;return;}
        rawItems=shopifyToRaw(prods, info.hostname);
      } else {
        setSt('URL non reconnue. Collection : /collections/X — Produit : /products/X — Recherche : /search?q=X','err');
        document.getElementById('bscan').disabled=false;return;
      }
    } else if(scanMode==='screenshot'){
      const input=document.getElementById('img-upload');
      const file=window._screenshotFile || (input&&input.files?input.files[0]:null);
      if(!file){setSt('Ajoutez d\'abord une capture (glisser, coller Ctrl+V, ou cliquer).','err');document.getElementById('bscan').disabled=false;return;}
      setSt('Compression et analyse de la capture en cours...','loading');
      const base64 = await resizeImage(file);
      rawItems=await analyzeScreenshot(base64);
    } else {
      const url=document.getElementById('scan-url').value.trim();
      if(!url){setSt('Collez une URL.','err');document.getElementById('bscan').disabled=false;return;}
      setSt('Analyse IA en cours (30–40s)...','loading');
      rawItems=await fetchAiScan(url);
    }

    setSt(`${rawItems.length} pièce${rawItems.length>1?'s':''} trouvée${rawItems.length>1?'s':''}. Traduction et descriptions en français...`,'loading');
    // Traitement par lots concurrents (3 en parallèle) = nettement plus rapide,
    // tout en restant doux pour l'API. generateDesc gère déjà ses propres erreurs.
    const CONCURRENCY=3; let done=0;
    async function processDesc(idx){
      const result = await generateDesc(rawItems[idx].name, rawItems[idx].rawDesc, rawItems[idx].cat);
      rawItems[idx].name = result.title || rawItems[idx].name;
      rawItems[idx].description = result.desc || '';
      done++;
      setSt('Traduction des descriptions… '+done+'/'+rawItems.length,'loading');
    }
    for(let start=0;start<rawItems.length;start+=CONCURRENCY){
      const batch=[];
      for(let k=start;k<Math.min(start+CONCURRENCY,rawItems.length);k++) batch.push(processDesc(k));
      await Promise.all(batch);
      if(start+CONCURRENCY<rawItems.length) await new Promise(function(r){setTimeout(r,400);});
    }
    scanRes=rawItems;
    scanChecked=new Set(rawItems.map((_,i)=>i));
    renderScanResults();
    if(window._aiLastError){
      var creditIssue=/credit balance|too low|billing|insufficient|quota/i.test(window._aiLastError);
      var msg=creditIssue
        ? 'Traduction IA indisponible : crédits Anthropic épuisés. Ajoutez des crédits sur console.anthropic.com (Plans & Billing). Les pièces sont importables avec leur titre d\'origine.'
        : 'Traduction IA indisponible ('+window._aiLastError+'). Les pièces sont importables avec leur titre d\'origine.';
      setSt('⚠ '+scanRes.length+' pièce(s) prête(s) — '+msg,'err');
    } else {
      setSt(`${scanRes.length} pièce${scanRes.length>1?'s':''} prête${scanRes.length>1?'s':''} — descriptions en français générées.`,'');
    }
  } catch(e){
    setSt('Erreur : '+e.message,'err');
  }
  const btn=document.getElementById('bscan'); if(btn) btn.disabled=false;
}

  // Doublons avec catalogue existant

  scanRes.forEach(function(p,i){
    function norm(s){return (s||'').toLowerCase().replace(/[^a-z0-9]/g,' ').replace(/\s+/g,' ').trim();}
    if(items.some(function(ex){return norm(ex.name)===norm(p.name);})) existDupIds.add(String(i));
  });
  const scStdCats=['Cadran','Boîtier','Lunette','Insert lunette','Aiguilles','Bracelet','Verre','Couronne','Mouvement','Rotor','Fond','Anneau','Tube couronne','Axe','Joint','Barre ressort','Autre'];
  const nChecked=scanChecked.size;

function setScanSupplier(i,sel){

  var sup=allSuppliers();

async function doImport(){

  if(!sel.length){setSt('Aucun produit sélectionné.','err');return;}

/* ══ ADMIN ══ */
let adminSelected = new Set();
let adminFilterCat = 'Tout';
let adminFilterSup = 'Tout';
let adminFilterStatus = 'Tout';
let adminSort = 'date';
let adminSearch = '';

/* ══ DOUBLONS ══ */
function findDuplicates(list){
  // Normaliser le titre : minuscules, sans ponctuation ni espaces multiples
  function norm(s){ return (s||'').toLowerCase().replace(/[^a-z0-9à-ÿ]/g,' ').replace(/\s+/g,' ').trim(); }
  const groups={};
  list.forEach(function(item){
    const key=norm(item.name);
    if(!key) return;
    if(!groups[key]) groups[key]=[];
    groups[key].push(item);
  });
  // Ne garder que les groupes avec 2+ items
  return Object.values(groups).filter(function(g){return g.length>1;});
}

function buildDupBlock(dups, onDelete){
  if(!dups.length) return '';
  var html='<div class="dup-block">'
    +'<div class="dup-block-title">⚠ '+dups.reduce(function(a,g){return a+g.length;},0)+' doublons détectés dans '+dups.length+' groupe'+(dups.length>1?'s':'')+'</div>';
  dups.forEach(function(group){
    html+='<div style="margin-bottom:.625rem;padding-bottom:.625rem;border-bottom:1px solid #fde9a0">';
    group.forEach(function(item, idx){
      html+='<div class="dup-row" style="cursor:pointer" data-editid="'+item.id+'" title="Cliquer pour modifier">'
        +'<div class="dup-thumb">'+(item.img?'<img src="'+item.img+'" alt="">':'')+'</div>'
        +'<div style="flex:1;min-width:0"><div style="font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+item.name+'</div>'
        +'<div style="font-size:10px;color:#aaa">'+item.cat+' — <span style="color:#c9a050">Cliquer pour voir / modifier</span></div></div>'
        +(idx>0?'<button data-delid="'+item.id+'" data-delfn="'+onDelete+'" class="dup-del-btn" style="font-size:9px;padding:2px 8px;background:transparent;border:1px solid #ffc107;border-radius:2px;cursor:pointer;color:#856404;white-space:nowrap">Supprimer</button>':'<span style="font-size:9px;color:#aaa;padding:2px 8px">original</span>')
        +'</div>';
    });
    html+='</div>';
  });
  html+='</div>';
  return html;
}

// Liste filtrée (catégorie + fournisseur + recherche + statut) — partagée
function adminFilteredList(){
  return items.filter(function(i){
    const matchCat=adminFilterCat==='Tout'||i.cat===adminFilterCat;
    const matchSup=adminFilterSup==='Tout'||i.supplier===adminFilterSup;
    const matchSearch=!adminSearch||(i.name||'').toLowerCase().includes(adminSearch.toLowerCase());
    const s=adminFilterStatus;
    const matchStatus=s==='Tout'||(s==='new'&&i.is_new)||(s==='custom'&&i.is_custom)||(s==='hidden'&&i.hidden)||(s==='visible'&&!i.hidden);
    return matchCat&&matchSup&&matchSearch&&matchStatus;
  });
}
function admStatus(s){ adminFilterStatus=(adminFilterStatus===s?'Tout':s); renderAdmin(); }

function renderAdmin(){
  const allCats=['Tout',...new Set(items.map(function(i){return i.cat;}).filter(Boolean))].sort();
  const allSups=['Tout',...new Set(items.map(function(i){return i.supplier;}).filter(Boolean))].sort();
  const stdCats=['Boîtier','Cadran','Lunette','Bracelet','Aiguilles','Verre','Couronne','Mouvement','Rotor','Insert lunette','Fond','Anneau','Joint','Axe','Barre ressort','Autre'];
  const bulkCats=[...new Set([...stdCats,...items.map(function(i){return i.cat;}).filter(Boolean)])].sort(function(a,b){return a.localeCompare(b,'fr');});

  let list=adminFilteredList();
  list=[...list].sort(function(a,b){
    if(adminSort==='nom') return (a.name||'').localeCompare(b.name||'','fr');
    if(adminSort==='cout') return (Number(a.cost||0)+Number(a.ship||0))-(Number(b.cost||0)+Number(b.ship||0));
    if(adminSort==='cout-desc') return (Number(b.cost||0)+Number(b.ship||0))-(Number(a.cost||0)+Number(a.ship||0));
    return Number(b.ts||0)-Number(a.ts||0); // date desc
  });

  const dups=findDuplicates(items);
  const nHidden=items.filter(function(i){return i.hidden;}).length;
  const nNew=items.filter(function(i){return i.is_new;}).length;
  const nCustom=items.filter(function(i){return i.is_custom;}).length;
  const nVisible=items.length-nHidden;
  function statCard(label,val,status){
    const on=status&&adminFilterStatus===status;
    const cls='stat'+(status?(' stat-clk'+(on?' stat-on':'')):'');
    const oc=status?(' onclick="admStatus(\''+status+'\')"'):'';
    return '<div class="'+cls+'"'+oc+'><div class="stat-l">'+label+'</div><div class="stat-v">'+val+'</div></div>';
  }

  document.getElementById('view').innerHTML=`
    <div style="display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:.85rem">
      <div style="font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:#999">Gestion du catalogue</div>
      <button class="btn-xs" onclick="normalizeCats()" title="Corriger automatiquement les accents dans les catégories">✓ Normaliser les catégories</button>
    </div>
    <div class="stat-row">
      ${statCard('Pièces',items.length,'Tout')}
      ${statCard('Visibles client',nVisible,'visible')}
      ${statCard('Nouveautés',nNew,'new')}
      ${statCard('Personnalisables',nCustom,'custom')}
      ${statCard('Masquées',nHidden,'hidden')}
      ${statCard('Catégories',allCats.length-1,null)}
    </div>

    ${dups.length?buildDupBlock(dups,'delItem'):''}

    <div style="background:#fff;border:1px solid #e8e5e0;border-radius:12px;padding:1rem;margin-bottom:1rem">
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:.75rem">
        <input class="s-in" style="flex:1;min-width:160px" placeholder="Rechercher une pièce..." value="${adminSearch}" oninput="adminSearch=this.value;renderAdmin()">
        <select onchange="adminFilterCat=this.value;renderAdmin()" style="padding:7px 10px;border:1px solid #d4cfc8;border-radius:8px;font-family:inherit;font-size:12px;background:#fff;color:#1a1a1a;outline:none">
          ${allCats.map(function(c){return '<option value="'+c+'"'+(adminFilterCat===c?' selected':'')+'>'+c+'</option>';}).join('')}
        </select>
        <select onchange="adminFilterSup=this.value;renderAdmin()" style="padding:7px 10px;border:1px solid #d4cfc8;border-radius:8px;font-family:inherit;font-size:12px;background:#fff;color:#1a1a1a;outline:none;max-width:180px">
          ${allSups.map(function(s){return '<option value="'+s+'"'+(adminFilterSup===s?' selected':'')+'>'+s+'</option>';}).join('')}
        </select>
        <select onchange="adminSort=this.value;renderAdmin()" style="padding:7px 10px;border:1px solid #d4cfc8;border-radius:8px;font-family:inherit;font-size:12px;background:#fff;color:#1a1a1a;outline:none">
          <option value="date" ${adminSort==='date'?'selected':''}>Plus récent</option>
          <option value="nom" ${adminSort==='nom'?'selected':''}>Nom A→Z</option>
          <option value="cout" ${adminSort==='cout'?'selected':''}>Coût ↑</option>
          <option value="cout-desc" ${adminSort==='cout-desc'?'selected':''}>Coût ↓</option>
        </select>
      </div>
      <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px">
        <div style="display:flex;align-items:center;gap:8px">
          <button class="btn-xs" onclick="admToggleAll()">${adminSelected.size===list.length&&list.length>0?'Tout décocher':'Tout cocher'}</button>
          ${adminSelected.size>0?`<span style="font-size:11px;color:#999">${adminSelected.size} sélectionnée${adminSelected.size>1?'s':''}</span>`:''}
          <span style="font-size:11px;color:#bbb">${list.length} pièce${list.length>1?'s':''} affichée${list.length>1?'s':''}${adminFilterStatus!=='Tout'?` · <a style="color:#c9a96e;cursor:pointer" onclick="adminFilterStatus='Tout';renderAdmin()">voir tout</a>`:''}</span>
        </div>
      </div>
    </div>

    ${adminSelected.size>0?`
    <div class="bulk-bar">
      <span class="bulk-count">${adminSelected.size} sélectionnée${adminSelected.size>1?'s':''}</span>
      <select class="bulk-sel" onchange="bulkSetCat(this.value);this.selectedIndex=0">
        <option value="">Changer catégorie…</option>
        ${bulkCats.map(function(c){return '<option value="'+c+'">'+c+'</option>';}).join('')}
      </select>
      <button class="btn-xs" onclick="bulkFlag('is_new',true)" title="Marquer comme Nouveauté">★ Nouveauté</button>
      <button class="btn-xs" onclick="bulkFlag('is_new',false)" title="Retirer le statut Nouveauté">Retirer ★</button>
      <button class="btn-xs" onclick="bulkFlag('hidden',true)" title="Masquer du catalogue client">Masquer</button>
      <button class="btn-xs" onclick="bulkFlag('hidden',false)" title="Afficher dans le catalogue client">Afficher</button>
      <button class="btn-xs del" onclick="delSelected()">Supprimer (${adminSelected.size})</button>
    </div>`:''}

    <div id="adm-list">
      ${list.length?list.map(admCard).join(''):`<div class="alert alert-info">Aucune pièce ne correspond aux filtres.</div>`}
    </div>`;
}

function admToggleAll(){
  // Sélectionner seulement les pièces actuellement affichées (filtres + statut)
  const visible=adminFilteredList();
  const allSelected=visible.length>0&&visible.every(function(i){return adminSelected.has(i.id);});
  if(allSelected) visible.forEach(function(i){adminSelected.delete(i.id);});
  else visible.forEach(function(i){adminSelected.add(i.id);});
  renderAdmin();
}

// Actions groupées sur la sélection admin
async function bulkSetCat(cat){
  if(!cat||!adminSelected.size) return;
  const ids=[...adminSelected];
  items=items.map(function(i){return adminSelected.has(i.id)?Object.assign({},i,{cat:cat}):i;});
  if(isConfigured()){ for(const id of ids){ await SB.update(id,{cat:cat}); } }
  renderAdmin();
}
async function bulkFlag(flag,val){
  if(!adminSelected.size) return;
  const ids=[...adminSelected];
  items=items.map(function(i){ if(!adminSelected.has(i.id)) return i; var n=Object.assign({},i); n[flag]=val; return n; });
  if(isConfigured()){ for(const id of ids){ var patch={}; patch[flag]=val; await SB.update(id,patch); } }
  renderAdmin();
}

function admToggle(id){
  adminSelected.has(id)?adminSelected.delete(id):adminSelected.add(id);
  renderAdmin();
}

async function delSelected(){
  if(!adminSelected.size) return;
  if(!confirm(`Supprimer ${adminSelected.size} pièce${adminSelected.size>1?'s':''} ?`)) return;
  for(const id of adminSelected){
    if(isConfigured()) await SB.remove(id);
    basket.delete(id);
  }
  items=items.filter(i=>!adminSelected.has(i.id));
  adminSelected.clear();
  renderAdmin();
}

function handleEditFile(input){
  if(input.files[0]) processEditFile(input.files[0]);
}

function processEditFile(file){
  const reader=new FileReader();
  reader.onload=async e=>{
    try {
      const base64 = await compressImage(e.target.result, 800);
      // Stocker dans une variable globale (fiable, pas de dépendance DOM)
      window._pendingEditImg = base64;
      const dc=document.getElementById('drop-content');
      if(dc) dc.innerHTML='<img src="'+base64+'" class="drop-preview" alt=""><div class="drop-zone-text">Image chargée ✓</div>';
      const urlIn=document.getElementById('edit-img-url'); if(urlIn) urlIn.value='';
    } catch(err) {
      console.error('Erreur image:', err);
      const dc=document.getElementById('drop-content');
      if(dc) dc.innerHTML='<div class="drop-zone-text" style="color:#c06060">Erreur de chargement de l\'image</div>';
    }
  };
  reader.readAsDataURL(file);
}

async function compressImage(dataUrl, maxW=800){
  return new Promise(res=>{
    const img=new Image();
    img.onload=()=>{
      const scale=Math.min(1,maxW/img.width);
      const c=document.createElement('canvas');
      c.width=Math.round(img.width*scale); c.height=Math.round(img.height*scale);
      c.getContext('2d').drawImage(img,0,0,c.width,c.height);
      res(c.toDataURL('image/jpeg',0.82));
    };
    img.src=dataUrl;
  });
}

function handleEditUrl(url){
  if(!url) return;
  const dc=document.getElementById('drop-content');
  if(dc) dc.innerHTML=`<img src="${url}" class="drop-preview" onerror="this.style.display='none'" alt=""><div class="drop-zone-text">Aperçu URL</div>`;
  window._pendingEditImg = null; // une URL annule l'image fichier
}

function supplierFromUrl(url){ try{ return new URL(url).hostname.replace('www.',''); }catch(e){ return ''; } }

// Agrège les pièces de plusieurs sélections, fusionne les fournisseurs, compte les quantités
function buildPurchasePlan(selIds){
  var partMap={};
  selIds.forEach(function(sid){
    var c=_selCache[sid]; if(!c) return;
    (c.items||[]).forEach(function(p){
      var live=items.find(function(x){return x.id===p.id;})||{};
      var url=p.url||live.url||'';
      var supplier=((live.supplier||p.supplier||'')+'').trim() || supplierFromUrl(url);
      var key=p.id||(p.name+'|'+url);
      if(!partMap[key]) partMap[key]={id:String(key),name:p.name||'Pièce',cat:p.cat||live.cat||'',img:p.img||live.img||'',cost:Number(p.cost||live.cost||0),ship:Number(p.ship||live.ship||0),url:url,supplier:supplier,qty:0,clients:{}};
      partMap[key].qty++;
      var cn=c.clientName||'Client';
      partMap[key].clients[cn]=(partMap[key].clients[cn]||0)+1;
    });
  });
  var parts=Object.keys(partMap).map(function(k){return partMap[k];});
  var online=parts.filter(function(p){return p.url;});
  var manual=parts.filter(function(p){return !p.url;});
  function groupBySupplier(arr){ var g={}; arr.forEach(function(p){ var s=p.supplier||'Autres'; (g[s]=g[s]||[]).push(p); }); return g; }
  return { onlineGroups:groupBySupplier(online), manual:manual };
}

function purchaseRow(p){
  var bought=boughtParts.has(p.id);
  var clientsTxt=Object.keys(p.clients).map(function(c){ var n=p.clients[c]; return c+(n>1?' ×'+n:''); }).join(', ');
  var imgAttr=(p.img||'').replace(/"/g,'&quot;');
  var urlAttr=(p.url||'').replace(/"/g,'&quot;');
  return '<div class="buy-row'+(bought?' bought':'')+'" id="buy-'+p.id+'">'
    +'<div class="buy-check'+(bought?' on':'')+'" onclick="togglePart(\''+p.id+'\')" title="Marquer comme achetée">'+(bought?'✓':'')+'</div>'
    +'<div class="buy-thumb">'+(p.img?'<img src="'+imgAttr+'" alt="" onerror="this.style.display=\'none\'">':'')+'</div>'
    +'<div class="buy-info">'
      +'<div class="buy-name">'+p.name+(p.qty>1?' <span class="buy-qty">×'+p.qty+'</span>':'')+'</div>'

    +'<div class="buy-price">'+(p.cost>0?(p.cost*p.qty).toFixed(2)+' €':'—')+(p.qty>1&&p.cost>0?'<span class="buy-unit">'+p.cost.toFixed(2)+' € × '+p.qty+'</span>':'')+'</div>'
    +(p.url?'<a class="btn-xs buy-link" href="'+urlAttr+'" target="_blank" rel="noopener">Acheter ↗</a>':'<span class="btn-xs" style="opacity:.5;cursor:default">Sur-mesure</span>')
    +'</div>';
